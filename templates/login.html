<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 海龟汤推理游戏</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 沿用主页面的亮色主题变量 */
            --bg-body: #f4f7f6;
            --bg-panel: #ffffff;
            --text-main: #333333;
            --text-muted: #777777;
            --border-color: #e0e0e0;
            --primary: #4a69bd; /* 统一使用沉稳蓝色 */
            --primary-hover: #3c559b;
            --error: #e74c3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans SC', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        .login-container {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--border-color);
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 500;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: var(--bg-panel);
            box-shadow: 0 0 0 3px rgba(74, 105, 189, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .error-message {
            color: var(--error);
            background: #fdf2f2;
            border: 1px solid #f9d6d6;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            display: none;
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>海龟汤推理游戏</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
            </div>
            <button type="submit" class="btn">立即登录</button>
        </form>
        
        <p class="error-message" id="errorMessage"></p>
        
        <div class="footer-links">
            <a href="/intro">查看游戏介绍 →</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // 重置错误状态
            errorMessage.style.display = 'none';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    errorMessage.textContent = data.error || '用户名或密码错误';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = '服务器连接失败，请稍后重试';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
